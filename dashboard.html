<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard | Sun Africa Loans</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f5f7fb 0%, #eef2f7 100%);
      color: #1e2a3a;
      min-height: 100vh;
      position: relative;
    }

    /* Animated background */
    .bg-shape {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }
    .bg-shape::before,
    .bg-shape::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      animation: floatBg 20s infinite alternate;
    }
    .bg-shape::before {
      width: 80%;
      height: 80%;
      top: -20%;
      left: -20%;
      background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, rgba(0,0,0,0) 70%);
    }
    .bg-shape::after {
      width: 60%;
      height: 60%;
      bottom: -20%;
      right: -20%;
      background: radial-gradient(circle, rgba(230,126,34,0.08) 0%, rgba(0,0,0,0) 70%);
      animation-delay: -5s;
    }
    @keyframes floatBg {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(5%,5%) scale(1.1); }
    }

    /* Floating particles */
    .particle {
      position: fixed;
      background: rgba(0, 43, 91, 0.15);
      border-radius: 50%;
      pointer-events: none;
      animation: floatParticle 12s infinite ease-in-out;
      z-index: 0;
    }
    @keyframes floatParticle {
      0%,100% { transform: translateY(0) translateX(0); opacity: 0.2; }
      50% { transform: translateY(-30px) translateX(15px); opacity: 0.5; }
    }

    /* Navbar */
    .dashboard-nav {
      background: rgba(10, 28, 47, 0.95);
      backdrop-filter: blur(12px);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .dashboard-nav h2 {
      font-size: 1.6rem;
      background: linear-gradient(120deg, #ffd700, #ffb347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .dashboard-nav div {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    #userName {
      font-weight: 600;
      background: rgba(255,255,255,0.2);
      padding: 6px 16px;
      border-radius: 40px;
    }
    .logout-btn {
      background: linear-gradient(90deg, #e67e22, #f39c12);
      border: none;
      padding: 8px 24px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .logout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(230,126,34,0.4);
    }

    /* Dashboard container */
    .dashboard-container {
      display: flex;
      max-width: 1400px;
      margin: 2rem auto;
      gap: 2rem;
      padding: 0 2rem;
      position: relative;
      z-index: 2;
      flex-wrap: wrap;
    }

    /* Sidebar */
    .sidebar {
      flex: 0 0 260px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 1.5rem 0.8rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.05);
      height: fit-content;
      position: sticky;
      top: 100px;
    }
    .sidebar button {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      padding: 12px 20px;
      margin: 6px 0;
      border-radius: 60px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      font-size: 1rem;
      color: #2c3e50;
    }
    .sidebar button:hover {
      background: rgba(0,43,91,0.08);
      transform: translateX(5px);
    }
    .sidebar button.active-tab {
      background: linear-gradient(90deg, #002b5b, #003f7f);
      color: white;
      box-shadow: 0 6px 14px rgba(0,43,91,0.3);
    }

    /* Main content */
    .main-content {
      flex: 1;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 2rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.05);
      transition: 0.3s;
    }
    .tab-content {
      display: none;
      animation: fadeIn 0.4s ease;
    }
    .tab-content.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Cards */
    .card {
      background: white;
      border-radius: 28px;
      padding: 1.5rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.02);
      border: 1px solid rgba(255,215,0,0.2);
    }
    .card h3 {
      color: #002b5b;
      margin-bottom: 1.2rem;
      font-size: 1.4rem;
      border-left: 5px solid #e67e22;
      padding-left: 15px;
    }

    /* Progress bar */
    .progress-container {
      margin: 1rem 0;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .progress-bar-bg {
      background: #e9ecef;
      border-radius: 20px;
      overflow: hidden;
      height: 12px;
    }
    .progress-fill {
      background: linear-gradient(90deg, #e67e22, #ffb347);
      width: 0%;
      height: 100%;
      border-radius: 20px;
      transition: width 0.6s ease;
    }

    /* Status badge */
    .status-badge {
      display: inline-block;
      padding: 4px 16px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 0.8rem;
    }
    .pending { background: #fef3c7; color: #b45309; }
    .approved { background: #e0f2fe; color: #0369a1; }
    .rejected { background: #fee2e2; color: #b91c1c; }

    /* Loan details grid */
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
      gap: 1rem;
      margin: 1rem 0;
    }
    .detail-item {
      background: #f8f9fc;
      padding: 1rem;
      border-radius: 20px;
    }
    .detail-label {
      font-size: 0.8rem;
      color: #6c757d;
      text-transform: uppercase;
    }
    .detail-value {
      font-size: 1.2rem;
      font-weight: bold;
      color: #002b5b;
    }

    /* Documents */
    .doc-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #eef2ff;
      padding: 8px 18px;
      border-radius: 40px;
      text-decoration: none;
      color: #002b5b;
      margin: 6px 8px 0 0;
      transition: 0.2s;
    }
    .doc-link:hover {
      background: #002b5b;
      color: white;
      transform: translateY(-2px);
    }

    /* Form */
    #profileForm {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    #profileForm input {
      padding: 12px 18px;
      border-radius: 60px;
      border: 2px solid #e2e8f0;
      font-size: 1rem;
      transition: 0.2s;
    }
    #profileForm input:focus {
      border-color: #e67e22;
      outline: none;
      box-shadow: 0 0 0 3px rgba(230,126,34,0.2);
    }
    #profileForm button {
      background: linear-gradient(90deg, #002b5b, #003f7f);
      border: none;
      padding: 12px;
      border-radius: 60px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    #profileForm button:hover {
      background: linear-gradient(90deg, #e67e22, #f39c12);
      transform: translateY(-2px);
    }
    #profileMsg {
      margin-top: 1rem;
      text-align: center;
    }

    @media (max-width: 850px) {
      .dashboard-container { flex-direction: column; }
      .sidebar { position: static; width: 100%; display: flex; gap: 0.5rem; overflow-x: auto; }
      .sidebar button { width: auto; white-space: nowrap; }
    }
  </style>
</head>
<body>
<div class="bg-shape"></div>

<nav class="dashboard-nav">
  <h2>☀️ Sun Africa Loans</h2>
  <div>
    <span id="userName">Loading...</span>
    <button id="logoutBtn" class="logout-btn">Sign Out</button>
  </div>
</nav>

<div class="dashboard-container">
  <aside class="sidebar">
    <button class="active-tab" data-tab="status">📊 Loan Status</button>
    <button data-tab="repayment">📅 Repayment & History</button>
    <button data-tab="documents">📂 My Documents</button>
    <button data-tab="profile">👤 Update Profile</button>
  </aside>
  <main class="main-content">
    <!-- Loan Status Tab -->
    <div id="status" class="tab-content active">
      <div class="card">
        <h3>Current Loan Details</h3>
        <div id="loanDetails">
          <p style="text-align:center;">Loading loan information...</p>
        </div>
        <!-- We'll insert progress info dynamically via JS, but we keep the container -->
        <div id="loanProgressContainer" style="margin-top: 1.5rem;"></div>
      </div>
    </div>

    <!-- Repayment Tab -->
    <div id="repayment" class="tab-content">
      <div class="card">
        <h3>Payment Schedule & History</h3>
        <div id="paymentHistory">
          <p>No payment records yet.</p>
        </div>
      </div>
    </div>

    <!-- Documents Tab -->
    <div id="documents" class="tab-content">
      <div class="card">
        <h3>Uploaded Documents</h3>
        <div id="documentsList">
          <p>No documents found.</p>
        </div>
      </div>
    </div>

    <!-- Profile Tab -->
    <div id="profile" class="tab-content">
      <div class="card">
        <h3>Update Profile</h3>
        <form id="profileForm">
          <input type="text" id="profileName" placeholder="Full Name" required>
          <input type="tel" id="profilePhone" placeholder="Phone Number" required>
          <button type="submit">Update Information</button>
        </form>
        <p id="profileMsg"></p>
      </div>
    </div>
  </main>
</div>

<script>
  // Floating particles creation
  (function createParticles() {
    const particleCount = 35;
    for (let i = 0; i < particleCount; i++) {
      const p = document.createElement('div');
      p.classList.add('particle');
      const size = Math.random() * 10 + 2;
      p.style.width = `${size}px`;
      p.style.height = `${size}px`;
      p.style.left = `${Math.random() * 100}%`;
      p.style.top = `${Math.random() * 100}%`;
      p.style.animationDelay = `${Math.random() * 10}s`;
      p.style.animationDuration = `${Math.random() * 12 + 6}s`;
      p.style.opacity = Math.random() * 0.4 + 0.1;
      document.body.appendChild(p);
    }
  })();

  // Tab switching logic (preserve existing data-tab behavior)
  document.querySelectorAll('.sidebar button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active-tab'));
      btn.classList.add('active-tab');
      const tabId = btn.getAttribute('data-tab');
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
    });
  });
</script>

<script type="module" src="js/dashboard.js"></script>
</body>
</html>
