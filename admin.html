<!-- admin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Sun Africa Loans</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a2b3e 0%, #1b4d6e 50%, #0f2c3f 100%);
      color: #1e2a3a;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background shapes */
    body::before {
      content: '';
      position: fixed;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 20% 40%, rgba(255,215,0,0.12) 0%, rgba(0,0,0,0) 50%);
      animation: drift 25s infinite linear;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      width: 150%;
      height: 150%;
      background: radial-gradient(circle at 80% 70%, rgba(230,126,34,0.08) 0%, rgba(0,0,0,0) 60%);
      animation: driftReverse 30s infinite linear;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-10%, -10%) rotate(5deg); }
    }

    @keyframes driftReverse {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(10%, 10%) rotate(-5deg); }
    }

    /* Floating particles */
    .particle {
      position: fixed;
      background: rgba(255, 215, 0, 0.3);
      border-radius: 50%;
      pointer-events: none;
      animation: floatParticle 10s infinite ease-in-out;
      z-index: 0;
    }

    @keyframes floatParticle {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.2; }
      50% { transform: translateY(-30px) translateX(15px); opacity: 0.6; }
    }

    /* Admin Header */
    .admin-header {
      background: rgba(10, 28, 47, 0.95);
      backdrop-filter: blur(10px);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      position: sticky;
      top: 0;
      z-index: 10;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .admin-header h1 {
      font-size: 1.6rem;
      letter-spacing: -0.5px;
      background: linear-gradient(120deg, #ffd700, #ffb347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    #adminLogout {
      background: linear-gradient(90deg, #e67e22, #f39c12);
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.9rem;
      box-shadow: 0 4px 12px rgba(230,126,34,0.3);
    }

    #adminLogout:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(230,126,34,0.5);
      background: linear-gradient(90deg, #f39c12, #e67e22);
    }

    /* Main container */
    .admin-container {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 2rem;
      position: relative;
      z-index: 2;
    }

    .admin-container h2 {
      color: white;
      margin-bottom: 1.5rem;
      font-size: 1.8rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    /* Applications grid */
    .applications-grid {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-bottom: 2.5rem;
    }

    /* Loan card styling */
    .loan-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 1.5rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      border: 1px solid rgba(255,215,0,0.3);
      animation: fadeSlideUp 0.5s ease-out;
    }

    .loan-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 35px rgba(0,0,0,0.15);
      border-color: #ffb347;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loan-card strong {
      color: #002b5b;
      font-size: 1.1rem;
    }

    .loan-card .doc-link {
      display: inline-block;
      margin: 0 6px 6px 0;
      padding: 5px 12px;
      background: #eef2ff;
      border-radius: 40px;
      text-decoration: none;
      color: #002b5b;
      font-size: 0.8rem;
      transition: 0.2s;
    }

    .loan-card .doc-link:hover {
      background: #002b5b;
      color: white;
      transform: scale(1.02);
    }

    .loan-card input[type="text"] {
      padding: 8px 15px;
      border-radius: 40px;
      border: 1px solid #ddd;
      margin: 8px 0;
      width: auto;
      max-width: 250px;
    }

    .loan-card button {
      margin: 5px 8px 5px 0;
      padding: 8px 18px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .comment-btn {
      background: #1976d2;
      color: white;
    }
    .comment-btn:hover {
      background: #0b5bab;
      transform: translateY(-2px);
    }
    .approve {
      background: #2e7d32;
      color: white;
    }
    .approve:hover {
      background: #1b5e20;
      transform: translateY(-2px);
    }
    .reject {
      background: #c0392b;
      color: white;
    }
    .reject:hover {
      background: #a93226;
      transform: translateY(-2px);
    }
    .disburse {
      background: #e67e22;
      color: white;
    }
    .disburse:hover:not(:disabled) {
      background: #d35400;
      transform: translateY(-2px);
    }
    .disburse:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
    }

    /* Repayment section */
    .repayment-section {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 1.8rem;
      margin-top: 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .repayment-section h3 {
      color: #002b5b;
      margin-bottom: 1rem;
      font-size: 1.5rem;
    }

    #paymentTracking {
      margin-bottom: 1rem;
    }

    #paymentTracking ul {
      list-style: none;
      padding-left: 0;
    }

    #paymentTracking li {
      padding: 8px 0;
      border-bottom: 1px solid #ecf0f1;
      font-size: 0.95rem;
    }

    #showPaymentBtn {
      background: linear-gradient(90deg, #002b5b, #003f7f);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
      margin-bottom: 1rem;
    }

    #showPaymentBtn:hover {
      background: linear-gradient(90deg, #e67e22, #f39c12);
      transform: translateY(-2px);
    }

    #addPaymentForm {
      background: #f8f9fc;
      padding: 1rem;
      border-radius: 24px;
      margin-top: 1rem;
      display: none;
    }

    #addPaymentForm input {
      padding: 10px 15px;
      margin: 8px 8px 8px 0;
      border-radius: 40px;
      border: 1px solid #ddd;
      width: auto;
      min-width: 150px;
    }

    #recordPaymentBtn {
      background: #27ae60;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      cursor: pointer;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .admin-container { padding: 0 1rem; }
      .loan-card input[type="text"] { max-width: 100%; width: 100%; }
      .loan-card button { margin: 5px 5px; }
      .admin-header h1 { font-size: 1.2rem; }
      #addPaymentForm input { width: 100%; margin: 8px 0; }
    }
  </style>
</head>
<body>
  <div class="admin-header">
    <h1>☀️ Sun Africa Loans – Admin Dashboard</h1>
    <button id="adminLogout">🚪 Logout</button>
  </div>
  <div class="admin-container">
    <h2>📋 Loan Applications Management</h2>
    <div id="applicationsList" class="applications-grid">Loading...</div>
    <div class="repayment-section">
      <h3>💰 Repayment Monitoring</h3>
      <div id="paymentTracking"></div>
      <div id="addPaymentForm">
        <input type="number" id="paymentAmount" placeholder="Amount (R)">
        <input type="text" id="paymentMethod" placeholder="Method (e.g., Cash, EFT)">
        <button id="recordPaymentBtn">✅ Record Payment</button>
      </div>
    </div>
  </div>

  <script>
    // Floating particles
    (function createParticles() {
      const particleCount = 40;
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        const size = Math.random() * 10 + 2;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.top = `${Math.random() * 100}%`;
        particle.style.animationDelay = `${Math.random() * 10}s`;
        particle.style.animationDuration = `${Math.random() * 8 + 5}s`;
        particle.style.opacity = Math.random() * 0.5 + 0.1;
        document.body.appendChild(particle);
      }
    })();

    // Add show/hide functionality for the payment form (to keep original behavior)
    // The original admin.js expects a button with id "showPaymentBtn" that toggles the form.
    // If not present, we will create a button dynamically to maintain compatibility.
    // But the original had a separate hidden div; we'll add a toggle button.
    document.addEventListener('DOMContentLoaded', () => {
      const paymentDiv = document.getElementById('addPaymentForm');
      if (paymentDiv && !document.getElementById('showPaymentBtn')) {
        const toggleBtn = document.createElement('button');
        toggleBtn.id = 'showPaymentBtn';
        toggleBtn.textContent = '➕ Record a Payment';
        const trackingDiv = document.getElementById('paymentTracking');
        trackingDiv.insertAdjacentElement('afterend', toggleBtn);
        toggleBtn.addEventListener('click', () => {
          paymentDiv.style.display = paymentDiv.style.display === 'none' ? 'block' : 'none';
        });
      }
      // Ensure the form starts hidden as originally intended
      if (paymentDiv) paymentDiv.style.display = 'none';
    });
  </script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
